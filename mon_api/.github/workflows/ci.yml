---
# CI/CD Pipeline for the API
# This workflow runs on pushes to the main branch,
# executes tests, and builds a Docker image if tests pass.

name: CI/CD Pipeline   # Nom du pipeline affiché dans GitHub Actions

on:
  push:
    branches:
      - main   # Trigger on push to main

jobs:
  # -------------------------------------------------
  # Tests job
  # -------------------------------------------------
  test:
    runs-on: ubuntu-latest   # VM Linux
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run tests
      - name: Run tests
        run: python -m pytest

  # -------------------------------------------------
  # Docker build job (runs after tests)
  # -------------------------------------------------
  docker:
    needs: test   # Runs only if tests pass
    runs-on: ubuntu-latest
    steps:
      # Checkout code again
      - name: Checkout code
        uses: actions/checkout@v3

      # Build Docker image
      - name: Build Docker image
        run: docker build -t api-test .
